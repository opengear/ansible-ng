name: Version Check
description: Check that the version and changelog has been updated before merge

runs:
  using: 'composite'
  steps:
      - name: Check if collection changed
        id: changed
        shell: bash
        run: |
          if git diff --name-only origin/main... | grep -qv '^.github/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check version bumped
        if: steps.changed.outputs.changed == 'true'
        shell: bash
        run: |
          OLD=$(git show origin/main:galaxy.yml \
            | grep '^version:' | awk '{print $2}' || true)
          NEW=$(grep '^version:' galaxy.yml \
            | awk '{print $2}')

          echo "Previous version: $OLD"
          echo "New version:      $NEW"

          if [ "$OLD" = "" ]; then
            echo "Warning: opengear.ng does not have version in target branch."
          fi

          if [ "$NEW" = "" ]; then
            echo "Error: opengear.ng does not have version in galaxy.yml."
            exit 1
          fi

          if [ "$OLD" = "$NEW" ]; then
            echo "::error::opengear.ng was modified but \
              galaxy.yml version was not bumped (still $OLD)"
            exit 1
          fi
