---

- name: System configuration
  hosts: all
  connection: httpapi
  tasks:
    - name: Change Admin Infro
      opengear.ng.system:
        config:
          admin_info:
            hostname: om1000
            contact: avankatw@digi.com.au
            location: AUS
    - name: Change Timezone
      opengear.ng.system:
        config:
          timezone: Australia/Brisbane
    - name: Add SSH Keys
      opengear.ng.system:
        config:
          system_authorized_keys:
            - key: "{{ 'rsa key' }}"
              username: root
              id: users_ssh_authorized_keys-1
        state:
          deleted
