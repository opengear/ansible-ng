---
# Integration tests for groups module
# Assumes a factory reset device with default groups:
#  - admin  (enabled: true,  access_rights: [admin])
#  - netgrp (enabled: false, access_rights: [admin])

# --- gathered ---
- name: Gather groups from device
  opengear.ng.groups:
    state: gathered
  register: result

- name: Assert gathered returns default groups
  ansible.builtin.assert:
    that:
      - result.gathered | length == 2
      - result.gathered | selectattr('groupname', 'equalto', 'admin') | list | length == 1
      - (result.gathered | selectattr('groupname', 'equalto', 'admin') | first).enabled == true
      - (result.gathered | selectattr('groupname', 'equalto', 'admin') | first).access_rights == ['admin']
      - result.gathered | selectattr('groupname', 'equalto', 'netgrp') | list | length == 1
      - (result.gathered | selectattr('groupname', 'equalto', 'netgrp') | first).enabled == false
      - (result.gathered | selectattr('groupname', 'equalto', 'netgrp') | first).access_rights == ['admin']

# --- merged: create ---
- name: Test merged-create
  block:
    - name: Create a new group via merged
      opengear.ng.groups:
        config:
          - groupname: ansible-test
            description: Created by Ansible integration test
            enabled: true
            access_rights:
              - pmshell
            ports:
              - ports-1
              - ports-2
        state: merged
      register: result

    - name: Assert group was created
      ansible.builtin.assert:
        that:
          - result.changed == true

    - name: Gather groups and verify new group exists
      opengear.ng.groups:
        state: gathered
      register: result

    - name: Get ansible-test group from gathered
      ansible.builtin.set_fact:
        test_group: "{{ result.gathered | selectattr('groupname', 'equalto', 'ansible-test') | first }}"

    - name: Assert new group is present with correct config
      ansible.builtin.assert:
        that:
          - test_group is defined
          - test_group.enabled == true
          - test_group.access_rights == ['pmshell']
          - test_group.ports == ['serial/by-opengear-id/port01', 'serial/by-opengear-id/port02']

  always:
    - name: Cleanup - delete ansible-test group
      opengear.ng.groups:
        config:
          - groupname: ansible-test
        state: deleted

    - name: Unset test_group fact
      ansible.builtin.set_fact:
        test_group: null

# --- merged: update (add port) ---
- name: Test merged-update
  block:
    - name: Setup - create group to update
      opengear.ng.groups:
        config:
          - groupname: ansible-test
            enabled: true
            access_rights:
              - pmshell
            ports:
              - ports-1
              - ports-2
        state: merged

    - name: Merge additional port into group
      opengear.ng.groups:
        config:
          - groupname: ansible-test
            ports:
              - ports-3
        state: merged
      register: result

    - name: Assert group was changed
      ansible.builtin.assert:
        that:
          - result.changed == true

    - name: Gather and verify ports were merged not replaced
      opengear.ng.groups:
        state: gathered
      register: result

    - name: Get ansible-test group from gathered
      ansible.builtin.set_fact:
        test_group: "{{ result.gathered | selectattr('groupname', 'equalto', 'ansible-test') | first }}"

    - name: Set expected ports
      ansible.builtin.set_fact:
        expected_ports:
          - serial/by-opengear-id/port01
          - serial/by-opengear-id/port02
          - serial/by-opengear-id/port03

    - name: Assert all ports are present
      ansible.builtin.assert:
        that:
          - test_group.ports | sort == expected_ports | sort
        fail_msg: "Ports mismatch. Actual: {{ test_group.ports | sort }} Expected: {{ expected_ports | sort }}"

  always:
    - name: Cleanup - delete ansible-test group
      opengear.ng.groups:
        config:
          - groupname: ansible-test
        state: deleted

    - name: Unset test_group fact
      ansible.builtin.set_fact:
        test_group: null

# --- merged: idempotent ---
- name: Test merged-idempotent
  block:
    - name: Setup - create group
      opengear.ng.groups:
        config:
          - groupname: ansible-test
            enabled: true
            access_rights:
              - pmshell
            ports: []
        state: merged

    - name: Merge same config again
      opengear.ng.groups:
        config:
          - groupname: ansible-test
            enabled: true
            access_rights:
              - pmshell
            ports: []
        state: merged
      register: result

    - name: Assert no change
      ansible.builtin.assert:
        that:
          - result.changed == false

  always:
    - name: Cleanup - delete ansible-test group
      opengear.ng.groups:
        config:
          - groupname: ansible-test
        state: deleted

# --- replaced ---
- name: Test replaced
  block:
    - name: Setup - create group with multiple ports
      opengear.ng.groups:
        config:
          - groupname: ansible-test
            enabled: true
            access_rights:
              - pmshell
            ports:
              - ports-1
              - ports-2
              - ports-3
        state: merged

    - name: Replace group with fewer ports
      opengear.ng.groups:
        config:
          - groupname: ansible-test
            enabled: true
            access_rights:
              - pmshell
            ports:
              - ports-1
            members: []
        state: replaced
      register: result

    - name: Assert group was changed
      ansible.builtin.assert:
        that:
          - result.changed == true

    - name: Gather and verify only specified ports remain
      opengear.ng.groups:
        state: gathered
      register: result

    - name: Assert ports were replaced not merged
      ansible.builtin.assert:
        that:
          - (result.gathered | selectattr('groupname', 'equalto', 'ansible-test') | first).ports == ['serial/by-opengear-id/port01']

  always:
    - name: Cleanup - delete ansible-test group
      opengear.ng.groups:
        config:
          - groupname: ansible-test
        state: deleted

# --- replaced: idempotent ---
- name: Test replaced-idempotent
  block:
    - name: Setup - create group
      opengear.ng.groups:
        config:
          - groupname: ansible-test
            enabled: true
            access_rights:
              - pmshell
            ports:
              - ports-1
            members: []
        state: merged

    - name: Replace with same config
      opengear.ng.groups:
        config:
          - groupname: ansible-test
            enabled: true
            access_rights:
              - pmshell
            ports:
              - ports-1
            members: []
        state: replaced
      register: result

    - name: Assert no change
      ansible.builtin.assert:
        that:
          - result.changed == false

  always:
    - name: Cleanup - delete ansible-test group
      opengear.ng.groups:
        config:
          - groupname: ansible-test
        state: deleted

# --- overridden ---
- name: Test overridden
  block:
    - name: Setup - create extra group
      opengear.ng.groups:
        config:
          - groupname: ansible-test
            enabled: true
            access_rights:
              - pmshell
            ports: []
        state: merged

    - name: Override with only default groups
      opengear.ng.groups:
        config:
          - groupname: admin
            enabled: true
            access_rights:
              - admin
            members:
              - root
          - groupname: netgrp
            enabled: false
            access_rights:
              - admin
            members: []
        state: overridden
      register: result

    - name: Assert changed
      ansible.builtin.assert:
        that:
          - result.changed == true

    - name: Gather and verify only default groups remain
      opengear.ng.groups:
        state: gathered
      register: result

    - name: Assert ansible-test group was removed
      ansible.builtin.assert:
        that:
          - result.gathered | length == 2
          - result.gathered | selectattr('groupname', 'equalto', 'ansible-test') | list | length == 0

  always:
    - name: Cleanup - restore default state via overridden
      opengear.ng.groups:
        config:
          - groupname: admin
            enabled: true
            access_rights:
              - admin
          - groupname: netgrp
            enabled: false
            access_rights:
              - admin
        state: overridden

# --- deleted ---
- name: Test deleted
  block:
    - name: Setup - create group to delete
      opengear.ng.groups:
        config:
          - groupname: ansible-test
            enabled: true
            access_rights:
              - pmshell
            ports: []
        state: merged

    - name: Delete group
      opengear.ng.groups:
        config:
          - groupname: ansible-test
        state: deleted
      register: result

    - name: Assert changed
      ansible.builtin.assert:
        that:
          - result.changed == true

    - name: Gather and verify group is gone
      opengear.ng.groups:
        state: gathered
      register: result

    - name: Assert group no longer exists
      ansible.builtin.assert:
        that:
          - result.gathered | selectattr('groupname', 'equalto', 'ansible-test') | list | length == 0

# --- deleted: idempotent ---
- name: Delete non-existent group
  opengear.ng.groups:
    config:
      - groupname: ansible-test
    state: deleted
  register: result

- name: Assert no change
  ansible.builtin.assert:
    that:
      - result.changed == false
