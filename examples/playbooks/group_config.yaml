---

- name: Configure user groups
  hosts: all
  connection: httpapi
  tasks:
    - name: Add groups
      opengear.om.om_groups:
        config:
          - groupname: netgrp
            enabled: true
            description: Group for users created automatically via network authentication
            access_rights:
              - admin
          - groupname: test4
            enabled: true
            description: This group was changed.
            access_rights:
              - admin
          - groupname: test5
            enabled: false
            description: This group was added.
            access_rights:
              - admin
          - groupname: test7
            enabled: true
            description: This group was added.
            access_rights:
              - pmshell
              - web_ui
            ports:
              - serial/by-opengear-id/port01
              - serial/by-opengear-id/port05
              - serial/by-opengear-id/port16
        state:
          overridden
